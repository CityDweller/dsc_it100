name: Validate

on:
  push:
  pull_request:
  schedule:
    # Re-validate weekly so HACS rule updates surface even when the repo is idle.
    - cron: "0 5 * * 1"

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          # 'brands' is validated against the home-assistant/brands repo,
          # which is a separate submission made around hacs/default
          # acceptance time. Ignore it here so CI stays green until that
          # brands PR is merged; remove this line once it is.
          ignore: brands

  hassfest:
    name: Hassfest (HA manifest validation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Hassfest
        uses: home-assistant/actions/hassfest@master
